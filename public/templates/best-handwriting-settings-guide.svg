<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Best handwriting settings guide</title>
  <desc id="desc">Recommended HandwritingTool settings for notes, letters, math pages, worksheets, and quick previews.</desc>
  <rect width="1200" height="760" fill="#f8fafc"/>
  <rect x="52" y="48" width="1096" height="664" rx="26" fill="#ffffff" stroke="#dbe7f3" stroke-width="2"/>
  <text x="92" y="112" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">Best Handwriting Settings</text>
  <text x="92" y="152" fill="#475569" font-family="Arial, sans-serif" font-size="22">Use these starting points, then preview the page before exporting.</text>
  <g font-family="Arial, sans-serif" font-size="19">
    <rect x="92" y="198" width="1016" height="56" rx="14" fill="#0f172a"/>
    <text x="122" y="233" fill="#ffffff" font-weight="700">Use case</text>
    <text x="335" y="233" fill="#ffffff" font-weight="700">Paper</text>
    <text x="510" y="233" fill="#ffffff" font-weight="700">Ink</text>
    <text x="670" y="233" fill="#ffffff" font-weight="700">Size</text>
    <text x="815" y="233" fill="#ffffff" font-weight="700">Spacing</text>
    <text x="982" y="233" fill="#ffffff" font-weight="700">Export</text>
    
    <rect x="92" y="240" width="1016" height="56" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="122" y="278" fill="#0f172a" font-weight="700">Study notes</text>
    <text x="335" y="278" fill="#334155">Lined</text>
    <text x="510" y="278" fill="#334155">Blue/Black</text>
    <text x="670" y="278" fill="#334155">Medium</text>
    <text x="815" y="278" fill="#334155">1.3-1.5</text>
    <text x="982" y="278" fill="#334155">PDF</text>
    
    <rect x="92" y="316" width="1016" height="56" rx="14" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="122" y="354" fill="#0f172a" font-weight="700">Personal letter</text>
    <text x="335" y="354" fill="#334155">Blank</text>
    <text x="510" y="354" fill="#334155">Black</text>
    <text x="670" y="354" fill="#334155">Medium</text>
    <text x="815" y="354" fill="#334155">1.5-1.7</text>
    <text x="982" y="354" fill="#334155">PDF/PNG</text>
    
    <rect x="92" y="392" width="1016" height="56" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="122" y="430" fill="#0f172a" font-weight="700">Math or lab</text>
    <text x="335" y="430" fill="#334155">Graph</text>
    <text x="510" y="430" fill="#334155">Blue/Black</text>
    <text x="670" y="430" fill="#334155">Small-Med</text>
    <text x="815" y="430" fill="#334155">1.2-1.4</text>
    <text x="982" y="430" fill="#334155">PDF</text>
    
    <rect x="92" y="468" width="1016" height="56" rx="14" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="122" y="506" fill="#0f172a" font-weight="700">Worksheet</text>
    <text x="335" y="506" fill="#334155">Blank/Lined</text>
    <text x="510" y="506" fill="#334155">Black</text>
    <text x="670" y="506" fill="#334155">Medium</text>
    <text x="815" y="506" fill="#334155">1.3-1.5</text>
    <text x="982" y="506" fill="#334155">PDF</text>
    
    <rect x="92" y="544" width="1016" height="56" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="122" y="582" fill="#0f172a" font-weight="700">Quick preview</text>
    <text x="335" y="582" fill="#334155">Any</text>
    <text x="510" y="582" fill="#334155">Blue</text>
    <text x="670" y="582" fill="#334155">Medium</text>
    <text x="815" y="582" fill="#334155">Normal</text>
    <text x="982" y="582" fill="#334155">PNG/JPG</text>
  </g>
  <rect x="92" y="646" width="1016" height="40" rx="14" fill="#e0f2fe"/>
  <text x="118" y="672" fill="#075985" font-family="Arial, sans-serif" font-size="18" font-weight="700">Tip: If a page looks crowded, split long paragraphs before reducing font size.</text>
</svg>